ireland_hold_dail_confidence_mission_timeout_tt: "The confidence effort stalls and Constitutional Authority falls."
ireland_labour_cross_border_council_success_tt: "Labour Cross Border Council regularises Labour organisation and supply without handing the movement to a foreign patron."
ireland_labour_cross_border_council_timeout_tt: "The cross-border council loses confidence, raising border pressure and foreign suspicion."
ireland_labour_democratic_return_check_success_tt: "Labour Democratic Return Check regularises Labour organisation and supply without handing the movement to a foreign patron."
ireland_ldf_training_cycle_success_tt: "LDF Training Cycle raises Emergency readiness through completed training, watch, intelligence, or stores work."
ireland_legal_worker_defence_mandate_success_tt: "Legal Worker Defence Mandate regularises Labour organisation and supply without handing the movement to a foreign patron."
ireland_legal_worker_defence_mandate_timeout_tt: "The worker defence mandate loses cabinet control and foreign access pressure rises."
ireland_london_channel_board_success_tt: "London Channel Board adjusts foreign access while keeping permanent basing and sponsor dependency under review."
ireland_lough_swilly_watch_rotation_success_tt: "The watch rotation improves coastwatch and border readiness at the northern approaches."
ireland_neutral_aftershock_recovery_mission_success_tt: "Neutral Aftershock Recovery builds a small-state diplomatic forum with observer rules and no permanent basing, preserving the compact as a conference framework."
ireland_international_observer_preparation_success_tt: "Observers are prepared for the settlement record, improving Northern legitimacy."
ireland_international_observer_preparation_timeout_tt: "Observer preparation stalls, and the settlement loses credibility."
ireland_northern_emergency_protectorate_success_tt: "The emergency protectorate opens under Irish control and begins its staged exit requirement."
ireland_northern_emergency_protectorate_timeout_tt: "The protectorate cannot be opened before the crisis outruns Dublin's mandate."
ireland_northern_integration_failure_review_success_tt: "Northern Integration Failure Review completes only if Northern control and settlement pressure still hold; otherwise the integration stage fails."
ireland_policing_transition_stage_success_tt: "The policing transition is recognised and the Northern integration stage advances."
ireland_protectorate_observer_corridor_success_tt: "Observer corridors open and add legitimacy to the protectorate exit."
ireland_protectorate_policing_board_success_tt: "The policing board gives the protectorate a controlled exit path."
ireland_protectorate_temporary_administration_success_tt: "Temporary administration is recognised and Partition Pressure eases."
ireland_rail_and_road_repair_contract_success_tt: "Rail And Road Repair Contract completes a regional recovery project and improves the relevant industry or supply track."
ireland_republican_reconciliation_backchannel_success_tt: "Republican Reconciliation Backchannel adjusts foreign access while keeping permanent basing and sponsor dependency under review."
ireland_republican_reconciliation_backchannel_timeout_tt: "The reconciliation channel breaks down, raising border pressure and foreign access pressure."
ireland_restore_civilian_rule_mission_success_tt: "Civilian rule returns, the directorate crisis is closed, and constitutional authority recovers."
ireland_restore_civilian_rule_mission_timeout_tt: "The directorate hardens into a permanent security state and constitutional authority falls."
ireland_route_authority_review_success_tt: "The review reinforces the current route through lawful authority or preparedness, depending on which bloc controls policy."
ireland_safehouse_audit_success_tt: "Safehouse Review cleans up underground networks and lowers the chance of a compromised republican crisis."
ireland_secure_berehaven_gate_success_tt: "Berehaven receives permanent coastal defence work and raises port readiness."
ireland_secure_cobh_approaches_success_tt: "Cobh receives coastal defences and anti-air work, raising port readiness."
ireland_service_continuity_stage_success_tt: "Service continuity is protected and Northern infrastructure improves."
ireland_turf_transport_priority_success_tt: "Turf Transport Priority completes a regional recovery project and improves the relevant industry or supply track."
ireland_unionist_safeguards_stage_success_tt: "Unionist safeguards are signed and the final integration check can proceed."
ireland_veterans_reconciliation_mission_success_tt: "Veterans reconciliation raises lawful authority and eases partition pressure through public settlement work."
ireland_veterans_reconciliation_mission_timeout_tt: "Veterans reconciliation falters and Partition Pressure rises."
ireland_emergency_stockpile_mission_timeout_tt: "The stores board misses its target, giving outside pressure more room to build."
ireland_coastwatch_posts_mission_timeout_tt: "The coastwatch post programme stalls, and foreign access pressure rises."
ireland_constitutional_concession_test_mission_timeout_tt: "The concession channel loses credibility and both partition and foreign access pressure rise."
ireland_neutral_aftershock_recovery_mission_timeout_tt: "The neutral recovery channel fails to settle the aftershock, raising foreign access pressure."
ireland_safehouse_audit_timeout_tt: "The safehouse review fails to close the file, and foreign access pressure rises."
ireland_courier_exposure_stage_timeout_tt: "The courier exposure stage fails to document the network before foreign pressure builds."
ireland_arms_surrender_channel_timeout_tt: "The arms surrender channel collapses and Partition Pressure rises."
ireland_border_cells_stand_down_timeout_tt: "Border cells refuse to stand down, strengthening Army Council pressure."
slopx_ireland_blueshirt_focus_effect_tt: "The corporatist route gains authority through coercive organisation while crisis and sponsor pressure remain active risks."
slopx_ireland_complete_all_island_settlement_tt: "Northern Ireland must be controlled and the settlement must be prepared before all-island identity changes apply."
slopx_ireland_constitutional_focus_effect_tt: "Constitutional authority rises through Dail procedure, legal continuity, and controlled opposition politics."
slopx_ireland_diplomacy_neutral_effect_tt: "Neutral diplomacy lowers foreign access pressure while strengthening sovereign authority."
slopx_ireland_diplomacy_sponsor_effect_tt: "Foreign cooperation improves outside channels but raises access pressure that must be contained later."
slopx_ireland_hidden_atlantic_focus_effect_tt: "The Atlantic compact advances as a conference and rule framework, not as a new country."
slopx_ireland_hidden_civic_focus_effect_tt: "Civic restoration proceeds through institutions and cultural administration while corruption risks stay blocked."
slopx_ireland_hidden_common_platform_focus_effect_tt: "The common-platform settlement gains legitimacy through observers, local support, and minority guarantees."
slopx_ireland_hidden_directorate_focus_effect_tt: "The directorate increases Emergency reach while making civilian recovery more urgent."
slopx_ireland_historical_focus_effect_tt: "Historical neutrality preserves sovereignty while preparing the state for Emergency costs."
slopx_ireland_industry_ports_project_tt: "Port recovery adds coastal capacity and affects later access and defence missions."
slopx_ireland_industry_power_project_tt: "Power and grid work adds regional industry or infrastructure capacity."
slopx_ireland_industry_rural_project_tt: "Rural recovery adds regional factories or stores instead of loose equipment grants."
slopx_ireland_industry_stores_project_tt: "Emergency stores improve preparedness and supply readiness."
slopx_ireland_ira_focus_effect_tt: "Republican route pressure rises through underground networks and border organisation."
slopx_ireland_labour_focus_effect_tt: "Labour expands democratic worker institutions while avoiding client dependency."
slopx_ireland_military_air_naval_effect_tt: "Air and naval readiness improves through training, observation, and research work."
slopx_ireland_military_coast_effect_tt: "Coastal readiness improves through state defences, watch posts, and port preparation."
slopx_ireland_military_regular_effect_tt: "Regular army readiness improves through doctrine, officers, and paid military preparation."
slopx_ireland_northern_escalation_effect_tt: "Northern pressure rises as armed or coercive preparations increase."
ireland_northern_integration_stage_failed_tt: "The Northern settlement stage fails because control, pressure, or safeguards no longer hold."
slopx_ireland_northern_integration_complete_tt: "Northern integration reaches its final stage and the settlement stabilises."
slopx_ireland_northern_preparation_effect_tt: "Settlement legitimacy improves and Partition Pressure eases through prepared Northern work."
slopx_ireland_opening_focus_effect_tt: "Ireland's opening settlement records the four national pressure ledgers and starts route preparation."
slopx_ireland_prepare_all_island_settlement_tt: "The all-island settlement gains legal preparation, but proclamation still requires control and agreement."
slopx_ireland_reveal_atlantic_hidden_path_tt: "The Atlantic compact lane opens after Ireland proves low foreign access, Emergency readiness, and no faction dependency."
slopx_ireland_reveal_civic_hidden_path_tt: "The civic restoration lane opens while democratic authority holds and foreign access remains below dependency."
slopx_ireland_reveal_common_platform_hidden_path_tt: "The common-platform lane opens after observer and settlement work make a legal Northern agreement credible."
slopx_ireland_reveal_directorate_hidden_path_tt: "The Emergency directorate lane opens under readiness pressure; recovery later requires civilian rule."
slopx_ireland_trigger_corrupted_restoration_failure_tt: "Foreign pressure corrupts the civic restoration attempt and opens recovery work."
