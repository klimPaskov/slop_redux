slopx_ireland_flavour.veterans_returning_from_britain.t: "Veterans Returning from Britain"
slopx_ireland_flavour.veterans_returning_from_britain.desc: "Irish citizens who served abroad is on the cabinet table. Returning volunteers carry political and social claims. The cabinet can commission local action or keep the response inside existing offices; either choice will shift postwar politics."
slopx_ireland_flavour.veterans_returning_from_britain.a: "Commission local action."
slopx_ireland_flavour.veterans_returning_from_britain.b: "Keep the response narrow."
slopx_ireland_flavour.last_emergency_order_review.t: "Last Emergency Order Review"
slopx_ireland_flavour.last_emergency_order_review.desc: "Emergency orders and restoration of normal law is on the cabinet table. The state must unwind extraordinary powers. The cabinet can commission local action or keep the response inside existing offices; either choice will shift cleanup and BOP."
slopx_ireland_flavour.last_emergency_order_review.a: "Commission local action."
slopx_ireland_flavour.last_emergency_order_review.b: "Keep the response narrow."
# END IRELAND FLAVOUR EVENTS GENERATED

# Ireland major route events
slopx_ireland_focus.opposition_front_built.t: "Opposition Front Built"
slopx_ireland_focus.opposition_front_built.desc: "Fine Gael deputies have rebuilt a legal opposition front inside constitutional politics. The government can treat the front as a sovereignty review partner or move security questions into a guarded liaison file."
slopx_ireland_focus.opposition_front_built.a: "Keep the challenge in parliament."
slopx_ireland_focus.opposition_front_built.b: "Attach security conditions."
slopx_ireland_focus.guarded_london_channel.t: "Guarded London Channel"
slopx_ireland_focus.guarded_london_channel.desc: "The London channel is open, but every contact raises the question of whether consultation becomes access. The cabinet must decide whether the file stays legal and narrow or becomes a defence link."
slopx_ireland_focus.guarded_london_channel.a: "Keep the channel narrow."
slopx_ireland_focus.guarded_london_channel.b: "Let defence officials speak."
slopx_ireland_focus.commonwealth_liaison_offer.t: "Commonwealth Liaison Offer"
slopx_ireland_focus.commonwealth_liaison_offer.desc: "A liaison offer promises information, shipping coordination, and quiet recognition of Irish interests. Accepting it improves preparedness, but a formal cap is needed if neutrality is to remain sovereign."
slopx_ireland_focus.commonwealth_liaison_offer.a: "Take the liaison boards."
slopx_ireland_focus.commonwealth_liaison_offer.b: "Cap the channel in writing."
slopx_ireland_focus.defence_consultation_backlash.t: "Defence Consultation Backlash"
slopx_ireland_focus.defence_consultation_backlash.desc: "Limited air and naval consultation has drawn attacks from both strict neutralists and British-facing pragmatists. The Dail can reassert control, or the defence file can continue under heavier pressure."
slopx_ireland_focus.defence_consultation_backlash.a: "Reassert Dail control."
slopx_ireland_focus.defence_consultation_backlash.b: "Accept the pressure."
slopx_ireland_focus.unionist_reassurance_attempt.t: "Unionist Reassurance Attempt"
slopx_ireland_focus.unionist_reassurance_attempt.desc: "Boundary files are now tied to public assurances about rights, policing, and local administration. The offer can lower Partition Pressure if it is disciplined, but a loose approach will harden alarm."
slopx_ireland_focus.unionist_reassurance_attempt.a: "Record the safeguards."
slopx_ireland_focus.unionist_reassurance_attempt.b: "Let the message travel on its own."
slopx_ireland_focus.parliamentary_review_asserts_sovereignty.t: "Parliamentary Review Asserts Sovereignty"
slopx_ireland_focus.parliamentary_review_asserts_sovereignty.desc: "The treaty review office has produced a parliamentary case for sovereignty without a break in public law. The opposition can press that advantage or attach defence readiness to the claim."
slopx_ireland_focus.parliamentary_review_asserts_sovereignty.a: "Put the legal case first."
slopx_ireland_focus.parliamentary_review_asserts_sovereignty.b: "Add a defence appendix."
slopx_ireland_focus.british_base_request_rejected_or_limited.t: "British Base Request Rejected or Limited"
slopx_ireland_focus.british_base_request_rejected_or_limited.desc: "A wartime association request has reached the cabinet in the language of practical defence. Ireland can reject basing outright or allow a controlled consultation file that increases foreign access pressure."
slopx_ireland_focus.british_base_request_rejected_or_limited.a: "No bases pass through this office."
slopx_ireland_focus.british_base_request_rejected_or_limited.b: "Permit a limited defence file."
slopx_ireland_focus.opposition_settlement_conference.t: "Opposition Settlement Conference"
slopx_ireland_focus.opposition_settlement_conference.desc: "The constitutional opposition has gathered settlement lawyers, border officers, and rights representatives. The conference can build Northern confidence or request observers before the public terms are ready."
slopx_ireland_focus.opposition_settlement_conference.a: "Publish the safeguards."
slopx_ireland_focus.opposition_settlement_conference.b: "Ask for observers first."
slopx_ireland_focus.labour_conference_mandate.t: "Labour Conference Mandate"
slopx_ireland_focus.labour_conference_mandate.desc: "Labour delegates have given William Norton a democratic mandate rather than a revolutionary brief. The party can keep authority in the Dail or let congress pressure define the movement."
slopx_ireland_focus.labour_conference_mandate.a: "Bind Labour to the Dail."
slopx_ireland_focus.labour_conference_mandate.b: "Let congress carry the room."
slopx_ireland_focus.trade_union_pressure_rises.t: "Trade Union Pressure Rises"
slopx_ireland_focus.trade_union_pressure_rises.desc: "Union councils want their new influence reflected in industry, wages, and public order. The government can formalise the councils or let pressure build outside cabinet discipline."
slopx_ireland_focus.trade_union_pressure_rises.a: "Bring the councils inside."
slopx_ireland_focus.trade_union_pressure_rises.b: "Let them press from outside."
slopx_ireland_focus.church_and_labour_tension.t: "Church and Labour Tension"
slopx_ireland_focus.church_and_labour_tension.desc: "Social reform has moved from manifesto language to institutional conflict. A compromise keeps Labour democratic and legal, while a sharper line increases foreign and domestic scrutiny."
slopx_ireland_focus.church_and_labour_tension.a: "Keep the compromise."
slopx_ireland_focus.church_and_labour_tension.b: "Answer with a sharper line."
slopx_ireland_focus.cooperative_industry_program.t: "Cooperative Industry Program"
slopx_ireland_focus.cooperative_industry_program.desc: "Worker industry boards are ready to decide where scarce materials, rural credit, and workshops go first. The program can serve a balanced cooperative economy or harden into congress control."
slopx_ireland_focus.cooperative_industry_program.a: "Fund cooperative production."
slopx_ireland_focus.cooperative_industry_program.b: "Give congress the storehouse file."
slopx_ireland_focus.worker_defence_regularisation.t: "Worker Defence Regularisation"
slopx_ireland_focus.worker_defence_regularisation.desc: "Workers defence committees are useful only if they answer to public law. Regularisation strengthens preparedness, while loose committees pull the balance toward congress pressure."
slopx_ireland_focus.worker_defence_regularisation.a: "Register every committee."
slopx_ireland_focus.worker_defence_regularisation.b: "Leave room for local initiative."
slopx_ireland_focus.anti_fascist_veteran_question.t: "Anti Fascist Veteran Question"
slopx_ireland_focus.anti_fascist_veteran_question.desc: "Veterans and organisers tied to anti fascist networks are asking for a place in Labour security policy. Keeping the file domestic protects the route; foreign channels make it harder to defend."
slopx_ireland_focus.anti_fascist_veteran_question.a: "Keep the file domestic."
slopx_ireland_focus.anti_fascist_veteran_question.b: "Accept the network pressure."
slopx_ireland_focus.soviet_liaison_warning.t: "Soviet Liaison Warning"
slopx_ireland_focus.soviet_liaison_warning.desc: "Radical foreign alignment has triggered warnings from civil servants and ministers who want Labour to remain democratic. The cabinet can verify distance from sponsors or let the liaison question grow."
slopx_ireland_focus.soviet_liaison_warning.a: "Verify democratic control."
slopx_ireland_focus.soviet_liaison_warning.b: "Keep the mission alive."
slopx_ireland_focus.cross_border_labour_contacts.t: "Cross Border Labour Contacts"
slopx_ireland_focus.cross_border_labour_contacts.desc: "Northern labour contacts want a social settlement before any constitutional settlement. A careful council can lower pressure, while a public campaign risks hardening unionist alarm."
slopx_ireland_focus.cross_border_labour_contacts.a: "Build a quiet council."
slopx_ireland_focus.cross_border_labour_contacts.b: "Let the campaign grow."
slopx_ireland_focus.workers_congress_overreach.t: "Workers Congress Overreach"
slopx_ireland_focus.workers_congress_overreach.desc: "Congress pressure is beginning to outrun the Dail mandate. Labour can restore cabinet control or let a route crisis form around unelected authority."
slopx_ireland_focus.workers_congress_overreach.a: "Restore cabinet control."
slopx_ireland_focus.workers_congress_overreach.b: "Yield to congress pressure."
slopx_ireland_focus.labour_constitutional_capstone.t: "Labour Returns to Constitutional Government"
slopx_ireland_focus.labour_constitutional_capstone.desc: "Ireland's Labour government has answered the wartime test without leaving democratic constitutional politics. Foreign observers see a social republic in policy, not a sponsor-built regime."
slopx_ireland_focus.labour_constitutional_capstone.a: "The mandate remains public."
slopx_ireland_focus.right_unity_council.t: "Right Unity Council"
slopx_ireland_focus.right_unity_council.desc: "The right wing of Irish politics is trying to organise around chambers, public order, and anti communist fear. The council can remain parliamentary or drift toward uniformed pressure."
slopx_ireland_focus.right_unity_council.a: "Keep the chambers parliamentary."
slopx_ireland_focus.right_unity_council.b: "Let the guard set the tone."
slopx_ireland_focus.uniformed_march_crisis.t: "Uniformed March Crisis"
slopx_ireland_focus.uniformed_march_crisis.desc: "A planned march has become a test of whether uniforms answer to law. The state can discipline the route or let the spectacle raise pressure in the streets."
slopx_ireland_focus.uniformed_march_crisis.a: "Discipline the march."
slopx_ireland_focus.uniformed_march_crisis.b: "Allow the show of force."
slopx_ireland_focus.corporate_chamber_proposal.t: "Corporate Chamber Proposal"
slopx_ireland_focus.corporate_chamber_proposal.desc: "The corporate chamber proposal is ready for administrative drafting. It can be shaped as a managed economic council or become the base of authoritarian guard politics."
slopx_ireland_focus.corporate_chamber_proposal.a: "Draft the chambers as administration."
slopx_ireland_focus.corporate_chamber_proposal.b: "Let the guard own the proposal."
slopx_ireland_focus.oduffy_confidence_test.t: "O'Duffy Confidence Test"
slopx_ireland_focus.oduffy_confidence_test.desc: "O'Duffy's return forces a confidence test inside the route. The movement can restrain him through chamber politics or accept a leader crisis."
slopx_ireland_focus.oduffy_confidence_test.a: "Restrain him through the chambers."
slopx_ireland_focus.oduffy_confidence_test.b: "Let the leader test the state."
slopx_ireland_focus.spanish_connection_returns.t: "Spanish Connection Returns"
slopx_ireland_focus.spanish_connection_returns.desc: "Veterans of the Spanish war are being used as proof of discipline and foreign usefulness. Ireland can turn the lessons into defence training or reopen sponsor pressure."
slopx_ireland_focus.spanish_connection_returns.a: "Use the lessons locally."
slopx_ireland_focus.spanish_connection_returns.b: "Let the channel expand."
slopx_ireland_focus.italian_contact_alarm.t: "Italian Contact Alarm"
slopx_ireland_focus.italian_contact_alarm.desc: "The Rome and Burgos channel is now visible enough to alarm civil servants. Containment protects sovereignty; indulgence strengthens foreign access pressure."
slopx_ireland_focus.italian_contact_alarm.a: "Contain the sponsor file."
slopx_ireland_focus.italian_contact_alarm.b: "Keep the channel open."
slopx_ireland_focus.labour_resistance_to_corporate_state.t: "Labour Resistance to the Corporate State"
slopx_ireland_focus.labour_resistance_to_corporate_state.desc: "Union resistance has become the first domestic test of the corporate route. A legal response keeps order; a harder answer turns opposition into a route crisis."
slopx_ireland_focus.labour_resistance_to_corporate_state.a: "Use legal controls."
slopx_ireland_focus.labour_resistance_to_corporate_state.b: "Break the resistance."
slopx_ireland_focus.guard_overreach_event.t: "Guard Overreach"
slopx_ireland_focus.guard_overreach_event.desc: "Guard activists have moved beyond the chamber brief and into direct intimidation. Restraining them preserves state authority, while delay lets the crisis harden."
slopx_ireland_focus.guard_overreach_event.a: "Pull them back."
slopx_ireland_focus.guard_overreach_event.b: "Let the guard settle it."
slopx_ireland_focus.corporate_chambers_without_chief.t: "Corporate Chambers Without the Chief"
slopx_ireland_focus.corporate_chambers_without_chief.desc: "The chambers have survived without O'Duffy at the centre. This route can remain an austere parliamentary right, but foreign and guard pressure still watch for an opening."
slopx_ireland_focus.corporate_chambers_without_chief.a: "Keep the chief outside."
slopx_ireland_focus.corporate_chambers_without_chief.b: "Invite harder pressure."
slopx_ireland_focus.corporate_route_foreign_reaction.t: "Foreign Reaction to the Corporate Route"
slopx_ireland_focus.corporate_route_foreign_reaction.desc: "Foreign governments now read the corporate route as a question of Irish sovereignty and public order. Ireland has built a domestic chamber state, but every sponsor contact will be scrutinised."
slopx_ireland_focus.corporate_route_foreign_reaction.a: "Keep the file Irish."
slopx_ireland_focus.safehouse_network_revealed.t: "Safehouse Network Revealed"
slopx_ireland_focus.safehouse_network_revealed.desc: "Safehouses and couriers have exposed the scale of the underground network. Civilian control can absorb part of it; army council pressure will make the state less predictable."
slopx_ireland_focus.safehouse_network_revealed.a: "Move through civilian channels."
slopx_ireland_focus.safehouse_network_revealed.b: "Let the council handle it."
slopx_ireland_focus.arms_cache_dispute.t: "Arms Cache Dispute"
slopx_ireland_focus.arms_cache_dispute.desc: "An arms cache has forced a choice between public control and underground credibility. The state can record and secure the cache, or allow the council to keep leverage."
slopx_ireland_focus.arms_cache_dispute.a: "Secure the cache."
slopx_ireland_focus.arms_cache_dispute.b: "Leave leverage with the council."
slopx_ireland_focus.army_council_demands_voice.t: "Army Council Demands Voice"
slopx_ireland_focus.army_council_demands_voice.desc: "The Army Council wants a voice in route decisions now that the underground is political. Recognising only civilian fronts preserves authority; accepting the demand opens a route crisis."
slopx_ireland_focus.army_council_demands_voice.a: "Recognise the civilian front."
slopx_ireland_focus.army_council_demands_voice.b: "Give the council a voice."
slopx_ireland_focus.civilian_front_attempts_control.t: "Civilian Front Attempts Control"
slopx_ireland_focus.civilian_front_attempts_control.desc: "The civilian republican front is trying to turn underground discipline into legal politics. If it succeeds, reconciliation becomes possible; if it fails, pressure returns to the council."
slopx_ireland_focus.civilian_front_attempts_control.a: "Open the reconciliation channel."
slopx_ireland_focus.civilian_front_attempts_control.b: "Let the council keep pressure."
slopx_ireland_focus.courier_contact_arrives.t: "Courier Contact Arrives"
slopx_ireland_focus.courier_contact_arrives.desc: "A foreign courier contact has arrived with promises that would compromise the network. Ireland can document and sever the contact or become dependent on it."
slopx_ireland_focus.courier_contact_arrives.a: "Use the contact."
slopx_ireland_focus.courier_contact_arrives.b: "Document and sever it."
slopx_ireland_focus.plan_kathleen_style_exposure.t: "Plan File Exposure"
slopx_ireland_focus.plan_kathleen_style_exposure.desc: "A file built around foreign-backed invasion assumptions has reached the public security desk. Exposure can prove the danger, but mishandling it will raise border pressure."
slopx_ireland_focus.plan_kathleen_style_exposure.a: "Expose the file fully."
slopx_ireland_focus.plan_kathleen_style_exposure.b: "Keep the exposure controlled."
slopx_ireland_focus.german_contact_dependency_crisis.t: "German Contact Dependency Crisis"
slopx_ireland_focus.german_contact_dependency_crisis.desc: "Foreign access pressure has made the courier channel a dependency crisis. The state can burn the channel cleanly or let the route crisis deepen."
slopx_ireland_focus.german_contact_dependency_crisis.a: "Burn the channel."
slopx_ireland_focus.german_contact_dependency_crisis.b: "Keep the dependency."
slopx_ireland_focus.border_cell_action.t: "Border Cell Action"
slopx_ireland_focus.border_cell_action.desc: "A border cell wants action before the Northern settlement file is ready. Standing it down protects legitimacy; permitting it raises Partition Pressure."
slopx_ireland_focus.border_cell_action.a: "Let the cell move."
slopx_ireland_focus.border_cell_action.b: "Stand the cell down."
slopx_ireland_focus.uprising_deadline_warning.t: "Uprising Deadline Warning"
slopx_ireland_focus.uprising_deadline_warning.desc: "The uprising cell deadline is approaching before the state has a verified settlement path. The cabinet can stop the clock or let pressure force a crisis."
slopx_ireland_focus.uprising_deadline_warning.a: "Let pressure force the issue."
slopx_ireland_focus.uprising_deadline_warning.b: "Stop the clock."
slopx_ireland_focus.state_absorbs_or_crushes_network.t: "State Absorbs or Crushes the Network"
slopx_ireland_focus.state_absorbs_or_crushes_network.desc: "The state can end the underground problem by absorbing disciplined elements or crushing the network entirely. A legal settlement improves authority; a harsher path keeps pressure alive."
slopx_ireland_focus.state_absorbs_or_crushes_network.a: "Absorb what can be controlled."
slopx_ireland_focus.state_absorbs_or_crushes_network.b: "Crush the network."
slopx_ireland_focus.compromised_network_collapse.t: "Compromised Network Collapse"
slopx_ireland_focus.compromised_network_collapse.desc: "The compromised republican network has reached a breaking point under foreign access pressure. Cleanup can still recover the route, but collapse will damage the Northern file."
slopx_ireland_focus.compromised_network_collapse.a: "Clean up the network."
slopx_ireland_focus.compromised_network_collapse.b: "Let the collapse run."
slopx_ireland_focus.shannon_grid_program.t: "Shannon Grid Program"
slopx_ireland_focus.shannon_grid_program.desc: "The Shannon extension has become a test of whether rural power policy can serve emergency production without relying on foreign suppliers. The board can keep the work domestic or invite pressure through outside contracts."
slopx_ireland_focus.shannon_grid_program.a: "Keep the board domestic."
slopx_ireland_focus.shannon_grid_program.b: "Accept outside contracts."
slopx_ireland_focus.sugar_beet_board_expands.t: "Sugar Beet Board Expands"
slopx_ireland_focus.sugar_beet_board_expands.desc: "Sugar beet contracts are linking farms, rail depots, and processing plants into a rural industrial network. Careful coordination lowers pressure across the island; a loose program weakens public authority."
slopx_ireland_focus.sugar_beet_board_expands.a: "Coordinate the board."
slopx_ireland_focus.sugar_beet_board_expands.b: "Let local contracts lead."
slopx_ireland_focus.turf_fuel_drive.t: "Turf Fuel Drive"
slopx_ireland_focus.turf_fuel_drive.desc: "The turf fuel drive is now a national preparedness file. It can build reliable emergency stores, but uneven requisitioning will damage trust in the state."
slopx_ireland_focus.turf_fuel_drive.a: "Put fuel into stores."
slopx_ireland_focus.turf_fuel_drive.b: "Push requisitioning harder."
slopx_ireland_focus.native_manufactures_debate.t: "Native Manufactures Debate"
slopx_ireland_focus.native_manufactures_debate.desc: "The native manufactures board is deciding whether workshops serve sovereignty first or chase scarce imported components. The choice will shape both authority and foreign access pressure."
slopx_ireland_focus.native_manufactures_debate.a: "Prioritise domestic workshops."
slopx_ireland_focus.native_manufactures_debate.b: "Permit imported components."
slopx_ireland_focus.port_repair_contracts.t: "Port Repair Contracts"
slopx_ireland_focus.port_repair_contracts.desc: "Port recovery contracts are useful only if Ireland controls the access they create. The board can repair ports under neutral rules or let foreign requests follow the work."
slopx_ireland_focus.port_repair_contracts.a: "Attach neutral rules."
slopx_ireland_focus.port_repair_contracts.b: "Let requests follow the contracts."
slopx_ireland_focus.rail_and_depot_survey.t: "Rail and Depot Survey"
slopx_ireland_focus.rail_and_depot_survey.desc: "Rail repair and emergency depot planning now share the same map room. A disciplined survey improves preparedness and can reduce border strain where transport links are sensitive."
slopx_ireland_focus.rail_and_depot_survey.a: "Build the depot map."
slopx_ireland_focus.rail_and_depot_survey.b: "Use it for border supply."
slopx_ireland_focus.rationing_and_supply_trust.t: "Rationing and Supply Trust"
slopx_ireland_focus.rationing_and_supply_trust.desc: "Rationing offices and emergency stores are testing whether the public trusts state distribution. Transparent rules strengthen authority; heavy handling damages confidence."
slopx_ireland_focus.rationing_and_supply_trust.a: "Publish the rules."
slopx_ireland_focus.rationing_and_supply_trust.b: "Hold the line through offices."
slopx_ireland_focus.industrial_self_sufficiency_capstone.t: "Ireland Reviews Industrial Self Sufficiency"
slopx_ireland_focus.industrial_self_sufficiency_capstone.desc: "The emergency economy has produced a network of power, food, workshops, transport, and stores. It is not abundance, but it gives Ireland a sovereign base for survival and postwar bargaining."
slopx_ireland_focus.industrial_self_sufficiency_capstone.a: "The file goes to cabinet."
slopx_ireland_focus.army_exercise_public_review.t: "Army Exercise Public Review"
slopx_ireland_focus.army_exercise_public_review.desc: "Army exercises have become public proof of readiness and restraint. A clear review reinforces constitutional control; a looser display raises doubts about discipline."
slopx_ireland_focus.army_exercise_public_review.a: "Review under civil authority."
slopx_ireland_focus.army_exercise_public_review.b: "Let the display speak."
slopx_ireland_focus.coastal_battery_plan.t: "Coastal Battery Plan"
slopx_ireland_focus.coastal_battery_plan.desc: "Port defence commands need battery sites, ammunition stores, and local labour. Neutral defence rules can protect sovereignty, while outside consultation increases foreign access pressure."
slopx_ireland_focus.coastal_battery_plan.a: "Keep batteries under Irish command."
slopx_ireland_focus.coastal_battery_plan.b: "Consult outside officers."
slopx_ireland_focus.look_out_posts_network_complete.t: "Look Out Posts Network Complete"
slopx_ireland_focus.look_out_posts_network_complete.desc: "The coastwatching network now links posts, reports, and warning routes around the island. It gives the Emergency state eyes without granting belligerents a base."
slopx_ireland_focus.look_out_posts_network_complete.a: "Record the western watch."
slopx_ireland_focus.look_out_posts_network_complete.b: "Share more reports abroad."
slopx_ireland_focus.ldf_training_problem.t: "LDF Training Problem"
slopx_ireland_focus.ldf_training_problem.desc: "Local Defence Force training has exposed gaps between enthusiasm, arms, and command discipline. Registration improves the force; local autonomy risks authority."
slopx_ireland_focus.ldf_training_problem.a: "Register the training scheme."
slopx_ireland_focus.ldf_training_problem.b: "Let local officers adapt."
slopx_ireland_focus.air_corps_warning_gap.t: "Air Corps Warning Gap"
slopx_ireland_focus.air_corps_warning_gap.desc: "Air warning missions are still constrained by aircraft, radio coverage, and weather reporting. Investing in the ring improves preparedness, but foreign help brings pressure with it."
slopx_ireland_focus.air_corps_warning_gap.a: "Build the warning ring."
slopx_ireland_focus.air_corps_warning_gap.b: "Ask for outside help."
slopx_ireland_focus.naval_patrol_shortage.t: "Naval Patrol Shortage"
slopx_ireland_focus.naval_patrol_shortage.desc: "Coastal patrols are stretched between neutrality enforcement, rescue work, and mine warnings. Ireland can keep patrols modest and sovereign or accept requests for closer coordination."
slopx_ireland_focus.naval_patrol_shortage.a: "Keep patrols sovereign."
slopx_ireland_focus.naval_patrol_shortage.b: "Coordinate more closely."
slopx_ireland_focus.border_drill_incident.t: "Border Drill Incident"
slopx_ireland_focus.border_drill_incident.desc: "A border drill has alarmed local communities and drawn attention from the Northern file. Reassurance can lower pressure; a hard posture may look more prepared but less legitimate."
slopx_ireland_focus.border_drill_incident.a: "Reassure the district."
slopx_ireland_focus.border_drill_incident.b: "Keep the hard posture."
slopx_ireland_focus.g2_security_success.t: "G2 Security Success"
slopx_ireland_focus.g2_security_success.desc: "G2 has closed a security file without turning the Emergency into spectacle. The cabinet can claim public authority or deepen the quiet apparatus."
slopx_ireland_focus.g2_security_success.a: "Report through cabinet."
slopx_ireland_focus.g2_security_success.b: "Strengthen the apparatus."
slopx_ireland_focus.emergency_defence_capstone.t: "Ireland's Emergency Defence State"
slopx_ireland_focus.emergency_defence_capstone.desc: "Emergency defence has grown from skeleton plans into ports, posts, stores, intelligence, and local forces. The state is still small, but it has a coherent defence posture."
slopx_ireland_focus.emergency_defence_capstone.a: "The Emergency watch is complete."
slopx_ireland_focus.britain_pressure_note.t: "Britain Sends a Pressure Note"
slopx_ireland_focus.britain_pressure_note.desc: "London's note frames access as practical necessity. Ireland can answer with liaison caps and legal limits or allow the note to open wider expectations."
slopx_ireland_focus.britain_pressure_note.a: "Answer with legal caps."
slopx_ireland_focus.britain_pressure_note.b: "Leave room for access."
slopx_ireland_focus.germany_access_probe.t: "Germany Access Probe"
slopx_ireland_focus.germany_access_probe.desc: "A German probe has reached the security desk through indirect channels. Containment protects neutrality, while mishandling the contact can compromise republican networks."
slopx_ireland_focus.germany_access_probe.a: "Contain and document it."
slopx_ireland_focus.germany_access_probe.b: "Let the probe continue."
slopx_ireland_focus.italy_and_spain_contact.t: "Italy and Spain Contact"
slopx_ireland_focus.italy_and_spain_contact.desc: "Contact through Rome and Burgos is politically useful to some routes and dangerous to neutrality. A balanced answer keeps it diplomatic; indulgence strengthens the guard."
slopx_ireland_focus.italy_and_spain_contact.a: "Keep it diplomatic."
slopx_ireland_focus.italy_and_spain_contact.b: "Let the guard use it."
slopx_ireland_focus.united_states_observer_question.t: "United States Observer Question"
slopx_ireland_focus.united_states_observer_question.desc: "American observers and diaspora pressure can support Irish recognition, but they also place neutral policy under a brighter foreign light. The cabinet must choose how visible the channel becomes."
slopx_ireland_focus.united_states_observer_question.a: "Invite observation."
slopx_ireland_focus.united_states_observer_question.b: "Keep recognition quiet."
slopx_ireland_focus.soviet_mission_offer.t: "Soviet Mission Offer"
slopx_ireland_focus.soviet_mission_offer.desc: "A Soviet-facing mission offer tests whether anti fascist politics can stay inside Irish democratic control. Labour can refuse sponsor dependency or accept a harder congress line."
slopx_ireland_focus.soviet_mission_offer.a: "Accept the mission pressure."
slopx_ireland_focus.soviet_mission_offer.b: "Keep Labour independent."
slopx_ireland_focus.vatican_channel_debate.t: "Vatican Channel Debate"
slopx_ireland_focus.vatican_channel_debate.desc: "The Vatican channel offers moral and diplomatic weight without formal alliance. Used carefully it strengthens authority; used carelessly it raises expectations abroad."
slopx_ireland_focus.vatican_channel_debate.a: "Use the channel carefully."
slopx_ireland_focus.vatican_channel_debate.b: "Let the channel carry more."
slopx_ireland_focus.foreign_access_threshold_warning.t: "Foreign Access Threshold Warning"
slopx_ireland_focus.foreign_access_threshold_warning.desc: "Foreign Access Pressure has crossed a dangerous threshold. The cabinet can claw back control through review, or leave a route crisis to grow around competing sponsors."
slopx_ireland_focus.foreign_access_threshold_warning.a: "Open a sovereignty review."
slopx_ireland_focus.foreign_access_threshold_warning.b: "Let the crisis run."
slopx_ireland_focus.neutral_conference_invitation.t: "Ireland Invites Neutral Conference Talks"
slopx_ireland_focus.neutral_conference_invitation.desc: "Ireland has invited small neutral states and observers to discuss shipping, relief, arbitration, and the discipline of sovereignty. The conference is a diplomatic concept, not a new country."
slopx_ireland_focus.neutral_conference_invitation.a: "Open the conference file."
slopx_ireland_focus.atlantic_compact_conference.t: "Atlantic Neutral Compact Conference"
slopx_ireland_focus.atlantic_compact_conference.desc: "The Atlantic compact is taking shape as a conference and possible faction of neutral states. It promises consultation, shipping observers, and arbitration without forming a new state."
slopx_ireland_focus.atlantic_compact_conference.a: "Keep the compact a conference."
slopx_ireland_focus.sponsor_dependency_backlash.t: "Sponsor Dependency Backlash"
slopx_ireland_focus.sponsor_dependency_backlash.desc: "Sponsor pressure has become public enough to damage the route that invited it. The cabinet can cut back dependency or let the backlash erode authority."
slopx_ireland_focus.sponsor_dependency_backlash.a: "Cut back dependency."
slopx_ireland_focus.sponsor_dependency_backlash.b: "Accept the backlash."
slopx_ireland_focus.northern_offer_announced.t: "Northern Offer Announced"
slopx_ireland_focus.northern_offer_announced.desc: "The Northern offer has been announced as a settlement file rather than a ladder of claims. It needs legitimacy, control, safeguards, and verification before the state can move further."
slopx_ireland_focus.northern_offer_announced.a: "Prepare the settlement file."
slopx_ireland_focus.northern_offer_announced.b: "Let alarm answer first."
slopx_ireland_focus.unionist_council_alarm.t: "Unionist Council Alarm"
slopx_ireland_focus.unionist_council_alarm.desc: "Unionist councils are treating Dublin's settlement work as a threat unless safeguards are visible. Reassurance can reduce pressure, while escalation risks a failed settlement."
slopx_ireland_focus.unionist_council_alarm.a: "Reassure the councils."
slopx_ireland_focus.unionist_council_alarm.b: "Escalate the file."
slopx_ireland_focus.british_cabinet_response.t: "British Cabinet Response"
slopx_ireland_focus.british_cabinet_response.desc: "Britain's cabinet has answered the Northern file with conditions, delays, and security warnings. Ireland can record the response for verification or allow it to raise pressure."
slopx_ireland_focus.british_cabinet_response.a: "Record the response."
slopx_ireland_focus.british_cabinet_response.b: "Push past the response."
slopx_ireland_focus.observer_mission_deployed.t: "Observer Mission Deployed"
slopx_ireland_focus.observer_mission_deployed.desc: "International observers are entering the settlement file as witnesses, not rulers. Their reports can strengthen legitimacy if the cabinet controls the terms."
slopx_ireland_focus.observer_mission_deployed.a: "Use observers for legitimacy."
slopx_ireland_focus.observer_mission_deployed.b: "Let observers broaden the file."
slopx_ireland_focus.border_security_incident.t: "Border Security Incident"
slopx_ireland_focus.border_security_incident.desc: "A border incident has tested whether security can support settlement instead of replacing it. Reassurance and preparedness must be balanced carefully."
slopx_ireland_focus.border_security_incident.a: "Reassure and hold readiness."
slopx_ireland_focus.border_security_incident.b: "Answer with pressure."
slopx_ireland_focus.plebiscite_preparation_dispute.t: "Plebiscite Preparation Dispute"
slopx_ireland_focus.plebiscite_preparation_dispute.desc: "Plebiscite preparation has exposed disputes over registers, observers, and local rights. A prepared route reduces pressure; an unresolved dispute delays the settlement."
slopx_ireland_focus.plebiscite_preparation_dispute.a: "Prepare the legal file."
slopx_ireland_focus.plebiscite_preparation_dispute.b: "Defer the dispute."
slopx_ireland_focus.cross_border_labour_mediation.t: "Cross Border Labour Mediation"
slopx_ireland_focus.cross_border_labour_mediation.desc: "Labour mediators are using workplace and council links to keep the Northern file social as well as constitutional. The channel can calm districts or become a congress pressure route."
slopx_ireland_focus.cross_border_labour_mediation.a: "Use the council for mediation."
slopx_ireland_focus.cross_border_labour_mediation.b: "Let congress press harder."
slopx_ireland_focus.common_platform_talks.t: "Common Platform Talks"
slopx_ireland_focus.common_platform_talks.desc: "The common platform talks are trying to turn rights, local administration, and constitutional safeguards into a shared settlement. Signing the charter improves the hidden path; delay raises pressure."
slopx_ireland_focus.common_platform_talks.a: "Sign the minority charter."
slopx_ireland_focus.common_platform_talks.b: "Delay the charter."
slopx_ireland_focus.protectorate_emergency_claim.t: "Protectorate Emergency Claim"
slopx_ireland_focus.protectorate_emergency_claim.desc: "A Northern emergency protectorate claim can only survive as a temporary emergency measure under strict conditions. It must carry an exit path or it will damage legitimacy."
slopx_ireland_focus.protectorate_emergency_claim.a: "Activate the temporary file."
slopx_ireland_focus.protectorate_emergency_claim.b: "Set an exit path."
slopx_ireland_focus.settlement_vote_or_agreement.t: "Settlement Vote or Agreement"
slopx_ireland_focus.settlement_vote_or_agreement.desc: "Ireland has the prepared file, control, and conditions needed to verify an all-island settlement. The decision is no longer a claim; it is an administrative and constitutional act."
slopx_ireland_focus.settlement_vote_or_agreement.a: "Proclaim the settlement."
slopx_ireland_focus.settlement_vote_or_agreement.b: "Defer the vote."
slopx_ireland_focus.integration_commission_begins.t: "Integration Commission Begins"
slopx_ireland_focus.integration_commission_begins.desc: "The integration commission has begun the slow work of offices, services, rights, and local representation. Progress must be staged or the settlement will fail in practice."
slopx_ireland_focus.integration_commission_begins.a: "Advance the commission."
slopx_ireland_focus.integration_commission_begins.b: "Slow the timetable."
slopx_ireland_focus.integration_backlash.t: "Integration Backlash"
slopx_ireland_focus.integration_backlash.desc: "Partition Pressure has returned during integration. The state can fail a stage and recover honestly, or spend authority to calm the backlash."
slopx_ireland_focus.integration_backlash.a: "Record the failed stage."
slopx_ireland_focus.integration_backlash.b: "Spend authority on reassurance."
slopx_ireland_focus.all_island_identity_news.t: "All Island Identity Verified"
slopx_ireland_focus.all_island_identity_news.desc: "Ireland has reached the point where all-island administration can be described as an identity change, not a paper claim. The verified integration record is what gives the proclamation weight."
slopx_ireland_focus.all_island_identity_news.a: "The island is accounted for."
slopx_ireland_focus.civic_cultural_restoration_revealed.t: "Civic Cultural Restoration Revealed"
slopx_ireland_focus.civic_cultural_restoration_revealed.desc: "The civic cultural restoration path has emerged from disciplined neutrality, legal authority, and low sponsor pressure. It is a state-building project, not a romantic shortcut."
slopx_ireland_focus.civic_cultural_restoration_revealed.a: "Build through institutions."
slopx_ireland_focus.civic_cultural_restoration_revealed.b: "Lean on mobilisation."
slopx_ireland_focus.civic_language_and_schools_program.t: "Language and Schools Program"
slopx_ireland_focus.civic_language_and_schools_program.desc: "The language and schools program is now part of civic restoration. It can be built through institutions or captured by mobilisation pressure."
slopx_ireland_focus.civic_language_and_schools_program.a: "Keep it institutional."
slopx_ireland_focus.civic_language_and_schools_program.b: "Let mobilisation lead."
slopx_ireland_focus.cultural_mobilisation_overreach.t: "Cultural Mobilisation Overreach"
slopx_ireland_focus.cultural_mobilisation_overreach.desc: "Civic restoration is at risk when mobilisation outruns institutions or foreign pressure corrupts the file. The state can restore balance or accept a failure state."
slopx_ireland_focus.cultural_mobilisation_overreach.a: "Restore institutional balance."
slopx_ireland_focus.cultural_mobilisation_overreach.b: "Let the failure surface."
slopx_ireland_focus.corrupted_restoration_failure.t: "Corrupted Restoration Failure"
slopx_ireland_focus.corrupted_restoration_failure.desc: "The restoration project has been compromised by pressure it was supposed to escape. Cleanup can still save state authority, but the failure will remain part of the public settlement."
slopx_ireland_focus.corrupted_restoration_failure.a: "Clean up the file."
slopx_ireland_focus.corrupted_restoration_failure.b: "Accept the damage."
slopx_ireland_focus.emergency_directorate_revealed.t: "Emergency Directorate Revealed"
slopx_ireland_focus.emergency_directorate_revealed.desc: "The Emergency directorate has emerged from high preparedness and centralised security practice. It can defend the state, but it must be watched if civilian rule is to return."
slopx_ireland_focus.emergency_directorate_revealed.a: "Strengthen the directorate."
slopx_ireland_focus.emergency_directorate_revealed.b: "Keep restoration visible."
slopx_ireland_focus.security_directorate_entrenches.t: "Security Directorate Entrenches"
slopx_ireland_focus.security_directorate_entrenches.desc: "The security directorate is becoming a permanent state habit. It improves emergency readiness, but every extra file makes civilian restoration harder."
slopx_ireland_focus.security_directorate_entrenches.a: "Entrench the apparatus."
slopx_ireland_focus.security_directorate_entrenches.b: "Balance it with civilians."
slopx_ireland_focus.civilian_restoration_deadline.t: "Civilian Restoration Deadline"
slopx_ireland_focus.civilian_restoration_deadline.desc: "The directorate path now faces a civilian restoration deadline. Meeting it protects authority; missing it shifts power toward permanent security rule."
slopx_ireland_focus.civilian_restoration_deadline.a: "Meet the deadline."
slopx_ireland_focus.civilian_restoration_deadline.b: "Let security delay it."
slopx_ireland_focus.neutral_aftershock_recovery.t: "Neutral Aftershock Recovery"
slopx_ireland_focus.neutral_aftershock_recovery.desc: "Ireland has reduced foreign access pressure after a crisis, but aftershocks remain in diplomatic files and domestic trust. Recovery requires cleanup, not triumphal language."
slopx_ireland_focus.neutral_aftershock_recovery.a: "Complete the recovery."
slopx_ireland_focus.neutral_aftershock_recovery.b: "Keep some access open."
slopx_ireland_focus.republican_reconciliation_backchannel.t: "Republican Reconciliation Backchannel"
slopx_ireland_focus.republican_reconciliation_backchannel.desc: "A republican reconciliation backchannel is possible only while foreign compromise is contained. The state can bring the front into a conference record or let council pressure return."
slopx_ireland_focus.republican_reconciliation_backchannel.a: "Record the conference."
slopx_ireland_focus.republican_reconciliation_backchannel.b: "Let pressure return."
slopx_ireland_focus.constitutional_backchannel.t: "Constitutional Backchannel"
slopx_ireland_focus.constitutional_backchannel.desc: "The constitutional backchannel can enforce caps on liaison and foreign access if it remains legal. A looser channel improves defence access but weakens the neutrality record."
slopx_ireland_focus.constitutional_backchannel.a: "Enforce liaison caps."
slopx_ireland_focus.constitutional_backchannel.b: "Use the defence channel."
slopx_ireland_focus.corporate_chamber_survival.t: "Corporate Chamber Survival"
slopx_ireland_focus.corporate_chamber_survival.desc: "The corporate chambers have survived without O'Duffy as a personal centre. Ireland can keep them administrative or let guard politics reclaim the route."
slopx_ireland_focus.corporate_chamber_survival.a: "Keep the chambers administrative."
slopx_ireland_focus.corporate_chamber_survival.b: "Let guard politics return."
slopx_ireland_focus.northern_emergency_protectorate_review.t: "Northern Emergency Protectorate Review"
slopx_ireland_focus.northern_emergency_protectorate_review.desc: "The emergency protectorate must be reviewed before it becomes a permanent substitute for settlement. Exit lowers pressure; extension makes the state more prepared but less trusted."
slopx_ireland_focus.northern_emergency_protectorate_review.a: "Exit the temporary file."
slopx_ireland_focus.northern_emergency_protectorate_review.b: "Extend the emergency file."
slopx_ireland_focus.unified_ireland_proclamation_event.t: "Unified Ireland Proclamation"
slopx_ireland_focus.unified_ireland_proclamation_event.desc: "The settlement has been proclaimed, but the proclamation is only the start of administration. The state can begin integration work or spend the moment on public authority."
slopx_ireland_focus.unified_ireland_proclamation_event.a: "Begin integration work."
slopx_ireland_focus.unified_ireland_proclamation_event.b: "Stabilise the proclamation."
slopx_ireland_focus.unified_ireland_news_event.t: "Ireland Verifies All Island Administration"
slopx_ireland_focus.unified_ireland_news_event.desc: "The verified integration record has made all-island administration credible abroad. The change rests on controlled territory, settlement conditions, and staged integration, not unsupported claims."
slopx_ireland_focus.unified_ireland_news_event.a: "The record is verified."
slopx_ireland_focus.post_settlement_integration_success.t: "Post Settlement Integration Success"
slopx_ireland_focus.post_settlement_integration_success.desc: "Integration has reached a workable stage across administration, rights, and local services. The settlement is now a functioning state process."
slopx_ireland_focus.post_settlement_integration_success.a: "Complete the stage record."
slopx_ireland_focus.post_settlement_integration_failure.t: "Post Settlement Integration Failure"
slopx_ireland_focus.post_settlement_integration_failure.desc: "The settlement has failed a real integration test. Recovery is possible, but the failure must be recorded rather than hidden behind a proclamation."
slopx_ireland_focus.post_settlement_integration_failure.a: "Recover through authority."
slopx_ireland_focus.post_settlement_integration_failure.b: "Let pressure rise."
slopx_ireland_focus.atlantic_compact_news_event.t: "Atlantic Compact Rules Agreed"
slopx_ireland_focus.atlantic_compact_news_event.desc: "The Atlantic compact rules have been agreed as a conference and faction concept for neutral cooperation. Ireland has not formed a new country; it has built a diplomatic framework."
slopx_ireland_focus.atlantic_compact_news_event.a: "Keep it a compact."
slopx_ireland_focus.labour_all_island_news_event.t: "Labour Carries the All Island Social File"
slopx_ireland_focus.labour_all_island_news_event.desc: "Labour's all-island work is now visible through councils, mediation, and social policy rather than sponsor dependency. The route remains democratic if public authority holds."
slopx_ireland_focus.labour_all_island_news_event.a: "The mandate crosses the border."
slopx_ireland_focus.corporate_state_news_event.t: "Corporate State Seeks Recognition"
slopx_ireland_focus.corporate_state_news_event.desc: "The corporate state has reached its late route form and now seeks to prove that chamber rule can hold the country together. Foreign observers will watch whether order or coercion defines it."
slopx_ireland_focus.corporate_state_news_event.a: "The chambers stand."
slopx_ireland_focus.revolutionary_republic_news_event.t: "Revolutionary Republic Declared"
slopx_ireland_focus.revolutionary_republic_news_event.desc: "The republican route has reached its late revolutionary form. Its future depends on whether the network was reconciled, controlled, or compromised by foreign pressure."
slopx_ireland_focus.revolutionary_republic_news_event.a: "The republic answers for the network."
slopx_ireland_focus.neutral_postwar_arbitration.t: "Neutral Postwar Arbitration"
slopx_ireland_focus.neutral_postwar_arbitration.desc: "Ireland is turning wartime neutrality into postwar arbitration, relief, and small-state recognition. The work gives the Atlantic conference substance beyond survival."
slopx_ireland_focus.neutral_postwar_arbitration.a: "Use the compact offices."
slopx_ireland_focus.neutral_postwar_arbitration.b: "Keep arbitration national."
slopx_ireland_focus.late_game_route_epilogue.t: "Ireland's Route Record"
slopx_ireland_focus.late_game_route_epilogue.desc: "Ireland's late settlement can be judged by visible authority, preparedness, partition pressure, foreign access, cabinet balance, Northern stages, hidden cleanup, and route achievements."
slopx_ireland_focus.late_game_route_epilogue.a: "File the national record."
